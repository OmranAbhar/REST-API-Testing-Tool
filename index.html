<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>REST-API-Testing-Tool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar border-bottom">
        <div>
          <h1>REST-API-Testing-Tool</h1>
          <p class="mb-0 text-secondary">SQLite-backed API testing workspace.</p>
        </div>
        <div class="toolbar-actions">
          <button class="btn btn-outline-secondary btn-sm" id="newRequestBtn" type="button">New</button>
          <button class="btn btn-outline-primary btn-sm" id="sampleBtn" type="button">Load sample</button>
          <button class="btn btn-outline-success btn-sm" id="exportBtn" type="button">Export JSON</button>
          <label class="btn btn-outline-secondary btn-sm mb-0" for="importInput">Import JSON</label>
          <input class="visually-hidden" id="importInput" type="file" accept="application/json,.json">
        </div>
      </header>

      <main class="app-layout">
        <aside class="panel sidebar-panel">
          <div class="panel-header">
            <h2>Collections</h2>
            <span class="db-status" id="dbStatus">SQLite loading</span>
          </div>

          <div class="sidebar-body">
            <label class="form-label" for="projectSelect">Project</label>
            <div class="input-group mb-2">
              <select class="form-select" id="projectSelect"></select>
              <button class="btn btn-outline-secondary" id="addProjectBtn" type="button">Add</button>
            </div>

            <label class="form-label" for="folderSelect">Folder</label>
            <div class="input-group mb-3">
              <select class="form-select" id="folderSelect"></select>
              <button class="btn btn-outline-secondary" id="addFolderBtn" type="button">Add</button>
            </div>

            <label class="form-label" for="searchInput">Search saved APIs</label>
            <input class="form-control mb-3" id="searchInput" type="search" placeholder="Name, URL, method, notes">

            <div class="list-title">
              <span>Saved APIs</span>
              <span id="requestCount">0</span>
            </div>
            <div class="saved-list" id="savedRequestsList"></div>

            <div class="list-title mt-3">
              <span>Request history</span>
              <span id="historyCount">0</span>
            </div>
            <div class="history-list" id="historyList"></div>
          </div>
        </aside>

        <section class="main-stack">
          <section class="request-bar">
            <label class="visually-hidden" for="methodSelect">HTTP method</label>
            <select class="form-select method-select" id="methodSelect">
              <option>GET</option>
              <option>POST</option>
              <option>PUT</option>
              <option>PATCH</option>
              <option>DELETE</option>
            </select>

            <label class="visually-hidden" for="urlInput">Request URL</label>
            <input class="form-control url-input" id="urlInput" type="url" placeholder="https://api.example.com/users" autocomplete="off">

            <button class="btn btn-primary send-button" id="sendBtn" type="button">
              <span class="send-label">Send</span>
              <span class="spinner-border spinner-border-sm d-none" id="sendSpinner" aria-hidden="true"></span>
            </button>
          </section>

          <div class="workspace-grid">
            <section class="panel request-panel">
              <div class="panel-header request-edit-header">
                <h2>Request</h2>
                <div class="request-actions">
                  <button class="btn btn-outline-warning btn-sm" id="favoriteBtn" type="button">Favorite</button>
                  <button class="btn btn-outline-secondary btn-sm" id="duplicateBtn" type="button">Duplicate</button>
                  <button class="btn btn-outline-danger btn-sm" id="deleteRequestBtn" type="button">Delete</button>
                  <button class="btn btn-success btn-sm" id="saveRequestBtn" type="button">Save</button>
                </div>
              </div>

              <div class="request-meta-form">
                <div>
                  <label class="form-label" for="requestNameInput">Name</label>
                  <input class="form-control" id="requestNameInput" type="text" placeholder="Untitled request">
                </div>
                <div>
                  <label class="form-label" for="descriptionInput">Description</label>
                  <input class="form-control" id="descriptionInput" type="text" placeholder="Short purpose or endpoint summary">
                </div>
                <div class="notes-field">
                  <label class="form-label" for="notesInput">Notes</label>
                  <textarea class="form-control" id="notesInput" rows="2" placeholder="Implementation details, auth notes, examples"></textarea>
                </div>
              </div>

              <ul class="nav nav-tabs compact-tabs" id="requestTabs" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="params-tab" data-bs-toggle="tab" data-bs-target="#paramsPane" type="button" role="tab">Params</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="headers-tab" data-bs-toggle="tab" data-bs-target="#headersPane" type="button" role="tab">Headers</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="body-tab" data-bs-toggle="tab" data-bs-target="#bodyPane" type="button" role="tab">Body</button>
                </li>
              </ul>

              <div class="tab-content panel-body">
                <div class="tab-pane fade show active" id="paramsPane" role="tabpanel" aria-labelledby="params-tab" tabindex="0">
                  <div class="section-toolbar">
                    <span>Query parameters</span>
                    <button class="btn btn-outline-secondary btn-sm" id="addParamBtn" type="button">Add param</button>
                  </div>
                  <div class="key-value-list" id="paramsList"></div>
                </div>

                <div class="tab-pane fade" id="headersPane" role="tabpanel" aria-labelledby="headers-tab" tabindex="0">
                  <div class="section-toolbar">
                    <span>Custom headers</span>
                    <button class="btn btn-outline-secondary btn-sm" id="addHeaderBtn" type="button">Add header</button>
                  </div>
                  <div class="key-value-list" id="headersList"></div>
                </div>

                <div class="tab-pane fade" id="bodyPane" role="tabpanel" aria-labelledby="body-tab" tabindex="0">
                  <fieldset class="body-type-grid" id="bodyTypeGroup">
                    <legend class="visually-hidden">Body type</legend>
                    <input class="btn-check" type="radio" name="bodyType" id="bodyNone" value="none" checked>
                    <label class="btn btn-outline-secondary" for="bodyNone">None</label>

                    <input class="btn-check" type="radio" name="bodyType" id="bodyJson" value="json">
                    <label class="btn btn-outline-secondary" for="bodyJson">JSON</label>

                    <input class="btn-check" type="radio" name="bodyType" id="bodyText" value="text">
                    <label class="btn btn-outline-secondary" for="bodyText">Text</label>

                    <input class="btn-check" type="radio" name="bodyType" id="bodyFormData" value="form-data">
                    <label class="btn btn-outline-secondary" for="bodyFormData">Form-data</label>

                    <input class="btn-check" type="radio" name="bodyType" id="bodyUrlEncoded" value="urlencoded">
                    <label class="btn btn-outline-secondary" for="bodyUrlEncoded">x-www-form-urlencoded</label>
                  </fieldset>

                  <div class="body-editor mt-3" id="rawBodyEditor">
                    <div class="section-toolbar">
                      <span id="rawBodyLabel">Request body</span>
                      <button class="btn btn-outline-secondary btn-sm" id="formatJsonBtn" type="button">Format JSON</button>
                    </div>
                    <textarea class="form-control code-input" id="rawBodyInput" spellcheck="false" placeholder="{&#10;  &quot;name&quot;: &quot;Ada&quot;&#10;}"></textarea>
                  </div>

                  <div class="body-editor mt-3 d-none" id="formDataEditor">
                    <div class="section-toolbar">
                      <span id="formRowsLabel">Body fields</span>
                      <button class="btn btn-outline-secondary btn-sm" id="addFormRowBtn" type="button">Add field</button>
                    </div>
                    <div class="key-value-list" id="formRowsList"></div>
                  </div>
                </div>
              </div>
            </section>

            <section class="panel response-panel">
              <div class="panel-header response-header">
                <h2>Response</h2>
                <div class="response-meta" id="responseMeta">
                  <span class="meta-pill neutral">Idle</span>
                </div>
              </div>

              <ul class="nav nav-tabs compact-tabs" id="responseTabs" role="tablist">
                <li class="nav-item" role="presentation">
                  <button class="nav-link active" id="response-body-tab" data-bs-toggle="tab" data-bs-target="#responseBodyPane" type="button" role="tab">Body</button>
                </li>
                <li class="nav-item" role="presentation">
                  <button class="nav-link" id="response-headers-tab" data-bs-toggle="tab" data-bs-target="#responseHeadersPane" type="button" role="tab">Headers</button>
                </li>
              </ul>

              <div class="tab-content response-content">
                <div class="tab-pane fade show active h-100" id="responseBodyPane" role="tabpanel" aria-labelledby="response-body-tab" tabindex="0">
                  <pre class="response-view" id="responseBody">Send a request to see the response here.</pre>
                </div>
                <div class="tab-pane fade h-100" id="responseHeadersPane" role="tabpanel" aria-labelledby="response-headers-tab" tabindex="0">
                  <pre class="response-view" id="responseHeaders">Response headers will appear here.</pre>
                </div>
              </div>
            </section>
          </div>
        </section>
      </main>
    </div>

    <template id="keyValueRowTemplate">
      <div class="key-value-row">
        <input class="form-control key-input" type="text" placeholder="Key">
        <input class="form-control value-input" type="text" placeholder="Value">
        <button class="btn btn-outline-danger remove-row-btn" type="button" aria-label="Remove row">Remove</button>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    <script src="app.js"></script>
  </body>
</html>
